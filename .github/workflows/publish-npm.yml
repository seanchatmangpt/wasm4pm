name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: npm install -g wasm-pack

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Install wasm4pm dependencies
        run: cd wasm4pm && npm install

      - name: Build WASM
        run: cd wasm4pm && npm run build:all

      - name: Build TypeScript packages
        run: pnpm -r --parallel build

      - name: Run tests
        run: cd wasm4pm && npm run test:unit

      - name: Remove wasm-pack generated pkg/.gitignore
        run: rm -f wasm4pm/pkg/.gitignore

      - name: Smoke test - verify npm pack includes pkg/
        run: |
          cd wasm4pm
          npm pack
          TARBALL=$(ls wasm4pm-*.tgz)
          mkdir -p /tmp/smoke-test-$$
          cp "$TARBALL" /tmp/smoke-test-$$/
          cd /tmp/smoke-test-$$
          npm init -y
          npm install "./$TARBALL"
          node -e "
            const pm = require('wasm4pm');
            if (!pm.WasmEventLog) throw new Error('WasmEventLog missing');
            if (typeof pm.discover_dfg !== 'function') throw new Error('discover_dfg missing');
            const v = pm.get_version();
            console.log('Smoke test PASSED - version:', v);
          "
          rm -rf /tmp/smoke-test-*
          rm -f /tmp/wasm4pm-*.tgz

      - name: Publish to npm
        run: cd wasm4pm && npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
