[[generation.rules]]
name = "tool-catalog"
description = "TypeScript catalog of all wasm4pm tools with typed constants, a ToolSpec record, and helper functions"
query = """
PREFIX wasm4pm: <urn:wasm4pm:>
PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

SELECT ?toolId ?label ?tier ?inputFormat ?outputFormat ?supportsOCEL ?requiresHandle ?durationMs ?endpoint
WHERE {
  ?tool a wasm4pm:Tool ;
        wasm4pm:toolId ?toolId ;
        skos:prefLabel ?label ;
        wasm4pm:performanceTier ?tierIRI ;
        wasm4pm:inputFormat ?inputFormat ;
        wasm4pm:outputFormat ?outputFormat ;
        wasm4pm:supportsOCEL ?supportsOCEL ;
        wasm4pm:requiresHandle ?requiresHandle ;
        wasm4pm:durationMs ?durationMs ;
        wasm4pm:k8sEndpoint ?endpoint .
  BIND(STRAFTER(STR(?tierIRI), "urn:wasm4pm:") AS ?tier)
}
ORDER BY ?toolId
"""
template = "./templates/tool-catalog.njk"
output_file = "packages/templates/src/index.ts"
enabled = true
mode = "overwrite"

