name: Build and Optimize WASM

on:
  workflow_run:
    workflows: [Comprehensive Test Suite]
    types: [completed]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C target-feature=+simd128"

jobs:
  build-wasm:
    name: Build WASM Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # Setup Rust
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache Rust builds
      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      # Install wasm-pack
      - name: Install wasm-pack
        run: npm install -g wasm-pack@1.3.4

      # Install wasm-opt for optimization
      - name: Install wasm-opt
        run: npm install -g wasm-opt

      # Install dependencies
      - name: Install dependencies
        working-directory: ./wasm4pm
        run: npm install

      # Build for all targets
      - name: Build WASM bundler target
        working-directory: ./wasm4pm
        run: npm run build

      - name: Build WASM Node.js target
        working-directory: ./wasm4pm
        run: npm run build:nodejs

      - name: Build WASM web target
        working-directory: ./wasm4pm
        run: npm run build:web

      # Get file sizes before optimization
      - name: Report sizes before optimization
        working-directory: ./wasm4pm/pkg
        run: |
          echo "=== WASM File Sizes (Before Optimization) ==="
          ls -lh *.wasm 2>/dev/null || echo "No WASM files found"
          du -sh . || echo "Total size unknown"

      # Optimize WASM with wasm-opt level 3
      - name: Optimize WASM with wasm-opt -O3
        working-directory: ./wasm4pm/pkg
        run: |
          echo "=== Optimizing WASM binaries ==="
          for wasm_file in *.wasm; do
            if [ -f "$wasm_file" ]; then
              echo "Optimizing $wasm_file with -O3 --enable-simd..."
              wasm-opt -O3 --enable-simd "$wasm_file" -o "${wasm_file}.opt"
              OLD_SIZE=$(stat -f%z "$wasm_file" 2>/dev/null || stat -c%s "$wasm_file")
              NEW_SIZE=$(stat -f%z "${wasm_file}.opt" 2>/dev/null || stat -c%s "${wasm_file}.opt")
              REDUCTION=$((100 * (OLD_SIZE - NEW_SIZE) / OLD_SIZE))
              echo "  Before: $OLD_SIZE bytes"
              echo "  After: $NEW_SIZE bytes"
              echo "  Reduction: ${REDUCTION}%"
              mv "${wasm_file}.opt" "$wasm_file"
            fi
          done

      # Report sizes after optimization
      - name: Report sizes after optimization
        working-directory: ./wasm4pm/pkg
        run: |
          echo "=== WASM File Sizes (After Optimization) ==="
          ls -lh *.wasm 2>/dev/null || echo "No WASM files found"
          du -sh . || echo "Total size unknown"

      # Verify WASM builds
      - name: Verify WASM modules
        working-directory: ./wasm4pm
        run: |
          echo "=== Verifying WASM modules ==="

          # Check bundler target
          if [ -f "pkg/wasm4pm.wasm" ]; then
            echo "✓ Bundler target exists: pkg/wasm4pm.wasm"
          else
            echo "✗ Bundler target missing: pkg/wasm4pm.wasm"
            exit 1
          fi

          # Check Node.js target
          if [ -f "pkg-nodejs/wasm4pm.wasm" ]; then
            echo "✓ Node.js target exists: pkg-nodejs/wasm4pm.wasm"
          else
            echo "✗ Node.js target missing: pkg-nodejs/wasm4pm.wasm"
            exit 1
          fi

          # Check web target
          if [ -f "pkg-web/wasm4pm.wasm" ]; then
            echo "✓ Web target exists: pkg-web/wasm4pm.wasm"
          else
            echo "✗ Web target missing: pkg-web/wasm4pm.wasm"
            exit 1
          fi

      # Generate WASM checksums
      - name: Generate checksums
        working-directory: ./wasm4pm
        run: |
          echo "=== Generating SHA256 checksums ==="
          (cd pkg && sha256sum *.wasm > ../wasm4pm-checksums.txt 2>/dev/null || shasum -a 256 *.wasm > ../wasm4pm-checksums.txt)
          (cd pkg-nodejs && sha256sum *.wasm >> ../wasm4pm-checksums.txt 2>/dev/null || shasum -a 256 *.wasm >> ../wasm4pm-checksums.txt)
          (cd pkg-web && sha256sum *.wasm >> ../wasm4pm-checksums.txt 2>/dev/null || shasum -a 256 *.wasm >> ../wasm4pm-checksums.txt)
          cat wasm4pm-checksums.txt

      # Quick smoke test
      - name: Smoke test WASM modules
        working-directory: ./wasm4pm
        run: |
          npm run build:nodejs
          node -e "const wasm = require('./pkg-nodejs'); console.log('WASM module loaded successfully'); console.log('Module exports:', Object.keys(wasm).slice(0, 10).join(', '), '...');"

      # Upload WASM artifacts
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v3
        with:
          name: wasm-artifacts
          path: |
            ./wasm4pm/pkg/
            ./wasm4pm/pkg-nodejs/
            ./wasm4pm/pkg-web/
            ./wasm4pm/wasm4pm-checksums.txt
          retention-days: 30

      # Create build summary
      - name: Create build summary
        run: |
          cat > /tmp/build-summary.md << 'EOF'
          # WASM Build Summary

          ## Artifacts Generated
          - ✓ Bundler target (pkg/)
          - ✓ Node.js target (pkg-nodejs/)
          - ✓ Web target (pkg-web/)

          ## Optimization
          - Applied wasm-opt -O3 --enable-simd to all WASM binaries
          - Enabled SIMD128 in Rust compilation (RUSTFLAGS)

          ## Verification
          - All WASM modules verified successfully
          - Checksums generated and available
          - Smoke test passed

          EOF
          cat /tmp/build-summary.md

      - name: Upload build summary
        uses: actions/upload-artifact@v3
        with:
          name: build-summary
          path: /tmp/build-summary.md
          retention-days: 5
