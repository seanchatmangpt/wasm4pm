# Valid advanced configuration with all options

[source]
type = "xes"
path = "./test-data/sample.xes"

[discovery]
algorithm = "genetic"
timeout = 60000
profile = "quality"

[genetic]
generations = 50
population_size = 100
mutation_rate = 0.1
crossover_rate = 0.8

[output]
format = "pnml"
path = "./results/model.pnml"
include_statistics = true
include_metrics = true
