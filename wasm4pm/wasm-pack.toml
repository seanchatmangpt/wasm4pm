[package]
name = "wasm4pm"
version = "0.1.0"
description = "Process Mining in WebAssembly - High-Speed Algorithms for Browser and Node.js"
repository = "https://github.com/seanchatmangpt/wasm4pm"
license = "MIT OR Apache-2.0"
authors = ["wasm4pm contributors"]
