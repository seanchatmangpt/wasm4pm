PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

SELECT ?toolId ?label ?tier ?inputFormat ?supportsOCEL ?requiresHandle ?durationMs
WHERE {
  ?tool a wasm4pm:Tool ;
